front:
  text: 洞眞太上九素語玉精眞訣通八三九素語玉精眞訣九天丈人三天玉童以上始元年天甲吉辰時加北維移度停軒三元齊景九帝迴眞登高上玉館紫虚之天三九素語披解靈關玉精眞訣理命長存開究遼朗清暢蕭條玉音秀虛瓊音逸霄香風激無慧唱遐寥流芳深頤氣冠神飈玉檢緫御萬仙來朝斯玄古之妙化經萬劫而不彫撰眞訣以遺觀試來心於懃翹若金名東華緑字紫庭得受妙篇位登玉清三關啓機九户受靈面登金容五藏華榮金眞感暢豁落洞明神燭潜照寳光夜生流金交擲焕落火鈴嘯命立到驅策神兵三元詣房降致緑軿乘空駕虚飛騰上清上相青童君曰三九素語出於九帝三眞命呪之辭理氣停年開解靈關五藏華鮮子有玉骨得見此文宻告明誓誓信九天潜修其道愼勿妄宣宣示非人考延子身不但風刀殃逮七玄明愼天科以求道眞九年不懈剋得上仙訣文以九天丈人三天玉童同時傳太帝君天帝君太微天帝君太帝君以傳南極上元君天帝君以傳西王母太微天帝君以傳金闕聖君金闕聖君傳上相青童君青童君傳西城王君使付後學應爲眞人者承眞相統氣係皇篇至王君巳經七千餘劫王君後封靈文於王屋山西穴玉室之內有素靈之官侍香典文其道祕妙不行於世若有玄名遇得此文萬仙來朝天官衛身懃行苦思白日昇晨凡受上清道德三寳妙章步虛昇玄之道而不先釋五藏開理幽闗萬氣不固眞靈不欣徒勞懃事萬不得仙今誤王訣上帝妙言以傳後學祕而奉眞慎勿輕傳殃滅子身每至本命之日沐浴入室東向叩齒九通冥目思東方青帝少陽九靈眞人諱拘上生身長九寸頭戴九元之冠衣單青飛裙手執青精玉板乗青雲飛興從十二青桂玉女從天清陽宮中來下以青雲冠覆我身思九靈眞人乗雲氣入我身中安鎮肝內便三呼少陽九靈眞人拘上生齎青芝五精補養我身便三味口三嚥止仰呪曰蒼元浩靈少陽先生九氣還肝使爲魄寧幽府結華藏内鮮明練容固體反白爲青神化内發景登紫庭敢有犯試摧以流鈴上帝玉録太清記名畢引氣九嚥止正南向㝠目叩齒三通思南方赤帝太陽南極眞人諱融尚生身長三寸頭戴進賢之冠衣緯章之衣手執朱玉之板乘赤雲飛輿從赤桂玉女十二人從天蘭臺宫中來下以丹雲飛輿冠覆我身思太陽南極眞人乘雲氣入我身中安鎮心内便三呼太陽南極眞人融尚生齎丹芝玉精補養我身便三味口三嚥仰祝曰赤庭絳雲上有高眞三氣歸心是我丹元騰我淨躬逕奏以聞心固神靜九靈閉關金眞内暎紫煙結雲太微緑字書名神仙飛行上清朝謁帝尊畢引氣三過嚥止正西向㝠目叩齒七通思西方白帝少隂素靈眞人諱辱明子身長七寸頭戴玉寳玄冠衣素錦之衣手執素玉之板乘白雲飛輿從素靈玉女十二人從天皇堂宫來下以素雲冠覆我身思素靈眞人乘雲氣入我身中安鎮胇内便三呼少隂素靈眞人辱明子齎洪芝玉精補養我身便三味口三嚥止仰呪曰素元洞虚天眞神廬七氣守胇與神同居保練五藏含華秀芝澄誠明石遊御玄虚白玉金字九帝眞書使我飛仙死名落除遊洞三清適意所如畢引氣七過嚥止正北向㝠目叩齒五通思北方黑帝太隂玄靈眞人諱㝠玄默身長五寸頭戴玄冠衣玄雲之衣手執玄精玉版乘玄雲飛輿從太玄玉女十二人從天玄隂玉虚宫中下以玄雲冠覆我身思太隂玄靈眞人乘雲入我身中安鎮腎内便三呼太隂玄靈眞人㝠玄默齎玄芝玉精補養我身便三味口三嚥止仰呪曰玄元北極太上靈璣五氣衛腎龜玉參差寳華結絡胃藏朗開神名玉臺年同二儀上皇太帝峙然不迷役使六甲以致八威參龍駕浮超然昇飛吐納神芝劫不衰畢引氣五過嚥止正向本命之上㝠目叩齒十二通思中央黄帝緫元三靈眞人諱原華身長一寸二分頭戴黄晨玉冠衣黄錦飛裙手執黄精玉版乘黄霞飛輿從中央黄帝玉女十二人從天玉房宫中下以黄雲覆冠我身思三靈眞人乘雲入我身中安鎮脾内便三呼緫元三靈眞人原華齎黄精玉芝補我身便三味口三嚥止仰呪曰黄元中帝本命之神一氣侍脾使我得眞實藏生華結絡紫晨變景練容保命長延後物而傾千神來臣老君玄録名書神仙長生久視與天同存畢引氣十二嚥止還東向瞑目叩齒三十六通思五氣玉清高皇上寳眞人諱太虚身長三寸頭戴玉晨之冠衣五色無縫單衣左手捧日精右手執月光鎮我上府泥丸宫中三呼上寳眞人太虚齎五氣流精陶灌我身便五味口五嚥止仰呪曰高上眞皇五帝太靈保我泥丸玄暎五形三光朗耀日月洞明飛雲流霞陶注玉精練容保魄神魂自生千變萬化昇入紫庭畢引氣五嚥止五方命呪畢摩兩掌拭面目如此五年面發金容五内華生玉藏保氣神仙道成三宫感暢眞靈見形乘空駕虚白日昇天惟在宻修愼勿輕傳八節投刺法夫修上法誦萬遍之道希眞致靈以求神仙者當以八節之日投刺靈山本命之嶽列奏玉清三年勿失則名書青宫札係玉皇玉華侍衛金晨奉迎此玉清眞訣帝君寳篇有得此訣計日昇仙妄泄神文考及九玄身没形殘長閉河源惟在宻修道不虚言夏至節之日於本命嶽正中南向叩齒三十二通仰微呪曰玄精陽明元始帝靈四景八氣緯度天經白元落死无英注生奏簡靈嶽録聞玉清高上帝尊記甲眞名伏須告御身謁紫庭三官九府靡不順聽畢嚥氣九過止還北向長跪讀簡呪如後法訖埋簡於絶巖之峯立秋之日正中向西南叩齒三十二通仰微呪曰流炎四射飛景啓明八氣交焕齊落天經元始告晨上應帝靈奏簡靈嶽東華記名長保玄室宴景紫庭三宫九府列我長生與天同休永保黄寧畢嚥氣九過止還北向長跪讀簡呪如後法訖埋簡秋分之日正中西向叩齒三十二通仰微呪曰少隂告運八道開張三象順迴緯度天梁元始勒正齊契四郷奏簡玄嶽上聞玉京上帝高尊記名無英三官落死九府順昌自爾之後三界司迎乘虚駕煙飛行太空畢嚥氣九過止還北向長跪讀簡呪如後法訖埋簡立冬之日正中西北向叩齒三十二通仰微祝曰玄隂御晨四運迴天八氣交度三五周還上帝告命日吉啓辰奏名青宫上補帝臣承天順命拜謁玉晨北酆落死南宫度名畢嚥氣九過止還北向長跪讀簡呪如後法訖埋簡冬至之日正中北向叩齒三十二通仰微呪曰隂精激氣朔晨乘㝠二景交絡運度天經九帝齊運焕采眞名奏札上聞記契玉庭五嶽三司咸定我生與日同光與天同寧畢嚥氣九過止長跪讀簡呪如後法訖埋簡立春之日正中東北向叩齒三十二通仰微呪曰陽精告始玄氣射晨二運交焕三五反眞上帝有命告我靈篇投簡靈嶽永保飛仙三官九府度我河源名叅帝籍長爲玉賔畢嚥炁九過止還北向長跪讀簡呪同後法訖埋簡春分之日正中東向叩齒三十二通仰微呪曰天清氣布浩素流青乘剛御晨迴五星黄籙暎魂東華保生長享无極億劫肇齡奏簡玉闕北帝落名遊歷玄臺浮景紫清畢嚥氣九過還北向長跪讀簡呪如後法訖埋簡立夏之日正中東南向叩齒三十二通仰微呪曰八氣維絡整位儛天五迴七轉變化忽聞三練九試改容易年濟景无蹉永保上仙畢嚥氣九過止還北向長跪讀簡呪如後法訖埋簡高上紫虚玉皇大洞三景弟子某嶽先生王甲年如干字某甲某月生已被三試應爲帝臣謹關五嶽靈山眞神三官九府十二河源記臣玄名上奏玉清
