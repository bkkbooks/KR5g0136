body:
  text: 右朱書銀刺上北向讀刺畢埋刺玄巖之下勿令人得知之北向再拜長跪讀簡畢又叩齒九通微呪曰元始帝皇高上玉真金仙父母玉華紫晨萬氣總司監真領仙上校青宫符命靈神檢定録札列奉帝前謹關九府三官河源度名玉篇永保長存畢埋簡此帝君素語妙訣傳有骨分應仙之人每至一節輒如上法令三年得二十四過投刺靈嶽則真皇注名帝給玉童玉女各十二人輕泄寶訣罪滅子身明愼玄科祕而奉修帝君玉文鎮神上法玉精訣言子欲隱學清齊山嶽當以壬癸之日刻青石黑書九天玉文埋所住東方臨埋時東向叩齒九通呪曰青辱青辱太山靈嶽九氣靈精長林幽黑三田藍波四腳六目上真宫宅四域普告千靈萬精靡不順伏玉帝有命干者刑戮畢埋石深九尺此帝君玉文鎮神上法文如左玉精訣言當以戊己之日刻白石以黃書九天玉文埋所住嶽西方臨埋時西向叩齒九通呪曰赤丹陽精南霍萬靈鬱蕭育飈乘幽入冥帝宫有位浮命黃寧自天以下敢不順聽有干者戮有犯者刑畢埋石深九尺此帝君玉文鎮神上法文如左玉精訣言當以戊己之日刻白石以黃書九天玉文埋所住嶽西方臨埋時西向叩齒九通呪曰白皓結羅素靈玄阿西嶽萬精乘氣逸波元始告命制御三華四域八氣悉為我家有干者斬有犯者刑畢埋石深九尺此帝君玉文鎮神上法文如左玉精訣言當以庚辛之日刻黑石以白書九天玉文埋所住嶽北方臨埋時北向叩齒九通呪曰北方恆山辰星之精玄蔭黑黠協氣放靈上帝有命玉文鎮生三道揚威所制不輕冝各順令復爾真形畢埋石深九尺此帝君玉文鎮神上法文如左玉精訣言當以丙丁之日刻黃石以赤書九天玉文埋所住嶽中央臨埋時向本命叩齒九通呪曰黃氣玄嵩總御五方上乘元命制伏妖王千卒伯扶與魔同凶天一帝靈受命九陽元始玉文鎮神中宫畢埋石深九尺此帝君玉文鎮神上法文如左右玉精鎮嶽上法帝君受於九天丈人口口之訣依上真玄科七百年聽傳有骨應仙之人自無玉名不得妄宣輕泄神文考延七祖殃滅子身受者愼焉祕而奉行傳真訣素語之要依明科皆齎金魚玉龍青紋四十尺金鈕九雙本命之繒百尺以誓九天之信告盟誓諸天清齊幽室然後奉傳虧誓違信師及弟子同罪鬼官傳受之身各詳愼而行洞真太上三九素語玉精真訣四域八氣悉為我家有干者斬有犯者刑畢埋石深九尺此帝君玉文鎮神上法文如左玉精訣言當以甲乙之日刻赤石以青書九天玉文埋所住嶽北方臨埋時北向叩齒九通呪曰北方𢘆山辰星之精玄蔭黑點協氣放靈上帝有命玉文鎮生三道揚威所制不輕冝各順令復爾真形畢埋石深九尺此帝君玉文鎮神上法文如左玉精訣言當以丙丁之日刻黃石以赤書九天玉文埋所住嶽中央臨埋時向本命叩齒九通呪曰黃氣玄嵩總御五方上乘元命制伏妖王千卒伯扶與魔同凶天一帝靈受命九陽元始玉文鎮神中宫畢埋石深九尺此帝君玉文鎮神上法文如左右玉精鎮嶽上法帝君受於九天丈人口口之訣依上真玄科七百年聽傳有骨應仙之人自無玉名不得妄宣輕泄神文考延七祖殃滅子身受者愼焉祕而奉行傳真訣素語之要依明科皆齎金魚玉龍青紋四十尺金鈕九雙本命之繒百尺以誓九天之信告盟誓諸天清齊幽室然後奉傳虧誓違信師及弟子同罪鬼官傳受之身各詳愼而行洞真太上三九素語玉精真訣
