front:
  text: 洞真太上九素語玉精真訣通八三九素語玉精真訣九天丈人三天玉童以上始元年天甲吉辰時加北維移度停軒三元齊景九帝回真登高上玉館紫虛之天三九素語披解靈關玉精真訣理命長存開究遼朗清暢蕭條玉音秀虛瓊音逸霄香風激無慧唱遐寥流芳深頤氣冠神飈玉檢總御萬仙來朝斯玄古之妙化經萬劫而不雕撰真訣以遺觀試來心於勤翹若金名東華緑字紫庭得受妙篇位登玉清三關啓機九户受靈面登金容五藏華榮金真感暢豁落洞明神燭潜照寶光夜生流金交擲焕落火鈴嘯命立到驅策神兵三元詣房降致緑軿乘空駕虛飛騰上清上相青童君曰三九素語出於九帝三真命呪之辭理氣停年開解靈關五藏華鮮子有玉骨得見此文密告明誓誓信九天潜修其道愼勿妄宣宣示非人考延子身不但風刀殃逮七玄明愼天科以求道真九年不懈剋得上仙訣文以九天丈人三天玉童同時傳太帝君天帝君太微天帝君太帝君以傳南極上元君天帝君以傳西王母太微天帝君以傳金闕聖君金闕聖君傳上相青童君青童君傳西城王君使付後學應為真人者承真相統氣係皇篇至王君巳經七千餘劫王君後封靈文於王屋山西穴玉室之內有素靈之官侍香典文其道祕妙不行於世若有玄名遇得此文萬仙來朝天官衛身勤行苦思白日升晨凡受上清道德三寶妙章步虛升玄之道而不先釋五藏開理幽關萬氣不固真靈不欣徒勞勤事萬不得仙今誤王訣上帝妙言以傳後學祕而奉真慎勿輕傳殃滅子身每至本命之日沐浴入室東向叩齒九通冥目思東方青帝少陽九靈真人諱拘上生身長九寸頭戴九元之冠衣單青飛裙手執青精玉板乘青雲飛興從十二青桂玉女從天清陽宮中來下以青雲冠覆我身思九靈真人乘雲氣入我身中安鎮肝內便三呼少陽九靈真人拘上生齎青芝五精補養我身便三味口三咽止仰呪曰蒼元浩靈少陽先生九氣還肝使為魄寧幽府結華藏內鮮明練容固體反白為青神化內發景登紫庭敢有犯試摧以流鈴上帝玉録太清記名畢引氣九咽止正南向冥目叩齒三通思南方赤帝太陽南極真人諱融尚生身長三寸頭戴進賢之冠衣緯章之衣手執朱玉之板乘赤雲飛輿從赤桂玉女十二人從天蘭臺宫中來下以丹雲飛輿冠覆我身思太陽南極真人乘雲氣入我身中安鎮心內便三呼太陽南極真人融尚生齎丹芝玉精補養我身便三味口三咽仰祝曰赤庭絳雲上有高真三氣歸心是我丹元騰我淨躬徑奏以聞心固神靜九靈閉關金真內映紫煙結雲太微緑字書名神仙飛行上清朝謁帝尊畢引氣三過咽止正西向冥目叩齒七通思西方白帝少隂素靈真人諱辱明子身長七寸頭戴玉寶玄冠衣素錦之衣手執素玉之板乘白雲飛輿從素靈玉女十二人從天皇堂宫來下以素雲冠覆我身思素靈真人乘雲氣入我身中安鎮胇內便三呼少隂素靈真人辱明子齎洪芝玉精補養我身便三味口三咽止仰呪曰素元洞虛天真神廬七氣守胇與神同居保練五藏含華秀芝澄誠明石遊御玄虛白玉金字九帝真書使我飛仙死名落除遊洞三清適意所如畢引氣七過咽止正北向冥目叩齒五通思北方黑帝太隂玄靈真人諱冥玄默身長五寸頭戴玄冠衣玄雲之衣手執玄精玉版乘玄雲飛輿從太玄玉女十二人從天玄隂玉虛宫中下以玄雲冠覆我身思太隂玄靈真人乘雲入我身中安鎮腎內便三呼太隂玄靈真人冥玄默齎玄芝玉精補養我身便三味口三咽止仰呪曰玄元北極太上靈璣五氣衛腎龜玉參差寶華結絡胃藏朗開神名玉臺年同二儀上皇太帝峙然不迷役使六甲以致八威參龍駕浮超然升飛吐納神芝劫不衰畢引氣五過咽止正向本命之上冥目叩齒十二通思中央黃帝總元三靈真人諱原華身長一寸二分頭戴黃晨玉冠衣黃錦飛裙手執黃精玉版乘黃霞飛輿從中央黃帝玉女十二人從天玉房宫中下以黃雲覆冠我身思三靈真人乘雲入我身中安鎮脾內便三呼總元三靈真人原華齎黃精玉芝補我身便三味口三咽止仰呪曰黃元中帝本命之神一氣侍脾使我得真實藏生華結絡紫晨變景練容保命長延後物而傾千神來臣老君玄録名書神仙長生久視與天同存畢引氣十二咽止還東向瞑目叩齒三十六通思五氣玉清高皇上寶真人諱太虛身長三寸頭戴玉晨之冠衣五色無縫單衣左手捧日精右手執月光鎮我上府泥丸宫中三呼上寶真人太虛齎五氣流精陶灌我身便五味口五咽止仰呪曰高上真皇五帝太靈保我泥丸玄映五形三光朗耀日月洞明飛雲流霞陶注玉精練容保魄神魂自生千變萬化升入紫庭畢引氣五咽止五方命呪畢摩兩掌拭面目如此五年面發金容五內華生玉藏保氣神仙道成三宫感暢真靈見形乘空駕虛白日升天惟在密修愼勿輕傳八節投刺法夫修上法誦萬遍之道希真致靈以求神仙者當以八節之日投刺靈山本命之嶽列奏玉清三年勿失則名書青宫札係玉皇玉華侍衛金晨奉迎此玉清真訣帝君寶篇有得此訣計日升仙妄泄神文考及九玄身沒形殘長閉河源惟在密修道不虛言夏至節之日於本命嶽正中南向叩齒三十二通仰微呪曰玄精陽明元始帝靈四景八氣緯度天經白元落死無英注生奏簡靈嶽録聞玉清高上帝尊記甲真名伏須告御身謁紫庭三官九府靡不順聽畢咽氣九過止還北向長跪讀簡呪如後法訖埋簡於絶巖之峯立秋之日正中向西南叩齒三十二通仰微呪曰流炎四射飛景啓明八氣交焕齊落天經元始告晨上應帝靈奏簡靈嶽東華記名長保玄室宴景紫庭三宫九府列我長生與天同休永保黃寧畢咽氣九過止還北向長跪讀簡呪如後法訖埋簡秋分之日正中西向叩齒三十二通仰微呪曰少隂告運八道開張三象順回緯度天梁元始勒正齊契四鄉奏簡玄嶽上聞玉京上帝高尊記名無英三官落死九府順昌自爾之後三界司迎乘虛駕煙飛行太空畢咽氣九過止還北向長跪讀簡呪如後法訖埋簡立冬之日正中西北向叩齒三十二通仰微祝曰玄隂御晨四運回天八氣交度三五周還上帝告命日吉啓辰奏名青宫上補帝臣承天順命拜謁玉晨北酆落死南宫度名畢咽氣九過止還北向長跪讀簡呪如後法訖埋簡冬至之日正中北向叩齒三十二通仰微呪曰隂精激氣朔晨乘冥二景交絡運度天經九帝齊運焕采真名奏札上聞記契玉庭五嶽三司咸定我生與日同光與天同寧畢咽氣九過止長跪讀簡呪如後法訖埋簡立春之日正中東北向叩齒三十二通仰微呪曰陽精告始玄氣射晨二運交焕三五反真上帝有命告我靈篇投簡靈嶽永保飛仙三官九府度我河源名參帝籍長為玉賔畢咽氣九過止還北向長跪讀簡呪同後法訖埋簡春分之日正中東向叩齒三十二通仰微呪曰天清氣布浩素流青乘剛御晨回五星黃籙映魂東華保生長享無極億劫肇齡奏簡玉闕北帝落名遊歷玄臺浮景紫清畢咽氣九過還北向長跪讀簡呪如後法訖埋簡立夏之日正中東南向叩齒三十二通仰微呪曰八氣維絡整位儛天五回七轉變化忽聞三練九試改容易年濟景無蹉永保上仙畢咽氣九過止還北向長跪讀簡呪如後法訖埋簡高上紫虛玉皇大洞三景弟子某嶽先生王甲年如干字某甲某月生已被三試應為帝臣謹關五嶽靈山真神三官九府十二河源記臣玄名上奏玉清
